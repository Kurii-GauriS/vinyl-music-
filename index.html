<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welc♡me to the Groove</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            /* Background image settings */
            background: url('https://tse2.mm.bing.net/th/id/OIP.FjgjHCufuCXb86cCEphlwAHaEK?rs=1&pid=ImgDetMain&o=7&rm=3') no-repeat center center fixed;
            background-size: cover;
        }
         /* Semi-transparent overlay for readability */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.295);
            z-index: -1;
        }
        .welcome-container {
            text-align: center;
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            background: rgba(174, 71, 197, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .disc-logo {
            font-size: 100px;
            display: inline-block;
            animation: spin 6s linear infinite; /* Slightly faster spin for energy */
            margin-bottom: 15px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h2 {
            font-size: 32px;
            margin: 0 0 10px 0;
            font-weight: bold;
            letter-spacing: 1px;
        }

        p {
            font-size: 16px;
            color: #b33333;
            margin: 0 0 35px 0;
            line-height: 1.4;
        }

        .enter-btn {
            display: inline-block;
            width: 80%;
            padding: 15px 0;
            background: rgb(161, 34, 178);
            border: 2px solid #ff33ff;
            border-radius: 30px;
            color: rgb(23, 23, 23);
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .enter-btn:hover {
            background: #8613bc;
            box-shadow: 0 0 20px rgba(122, 14, 200, 0.745);
            transform: scale(1.02); /* Subtle pop effect */
        }
    </style>
</head>
<body>

<div class="welcome-container">
    <div class="disc-logo">💿</div>
    <br>
    <h1>Welcome to a world of Thai melodies.</h1>

    <!-- This takes the user straight to your main page instantly -->
    <a href="music.html" class="enter-btn">Every record has a story.</a>
</div>

</body>
</html>
