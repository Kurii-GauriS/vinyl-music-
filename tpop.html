    <style>
        body {
            margin: 0;
            text-align: center;
            padding-top: 50px;
            color: rgb(184, 21, 124);
            /* Background image settings */
             background: url('https://i.ytimg.com/vi/e94hCLHEEsk/maxresdefault.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* Semi-transparent overlay for readability */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        /* Grid Container for 4x4 layout */
        .song-container {
            display: grid;
            /* Auto-fit will create 4 columns on desktop and adapt to smaller screens */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px 60px;
            padding: 50px;
            max-width: 1400px;
            margin: 0 auto;
            justify-items: center;
        }

        .music-card {
            width: 100%;
            max-width: 350px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column; /* Stacks items vertically to fit the grid */
            justify-content: center;
            align-items: center;
            gap: 15px;
            border-radius: 35px;
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, .2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, .4);
            /* Motion/Scroll Animation Setup */
            opacity: 0;
            transform: translateY(80px);
            transition: opacity 0.7s, transform 0.7s, box-shadow 0.4s;
        }

        .music-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .music-card:hover {
            box-shadow: 0 20px 45px rgba(0, 0, 0, .6);
        }

        .music-info {
            width: 100%;
            text-align: center;
        }

        .music-info h1 {
            color: rgb(239, 187, 114);
            font-size: 30px;
            margin-bottom: 5px;
        }

        .music-info p {
            color: #ffffff;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .music-info audio {
            width: 90%;
        }
.glass-btn {
    display: inline-block;
    padding: 12px 28px;
    border-radius: 30px;

    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    border: 1px solid rgb(0, 0, 0);

    color: rgb(240, 197, 197);
    text-decoration: none;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.5px;

    cursor: pointer;

    transition: all 0.35s ease;
}

.glass-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15);
}

.glass-btn:active {
    transform: scale(0.97);
}

        .disc {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffffff 0%, #000000 10%, rgb(164, 0, 0) 13%, black 70%);
            border: 6px solid #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            box-shadow: 0 0 20px red;
            transition: box-shadow .4s ease, transform .4s ease;
        }

        .disc:hover {
            box-shadow: 0 0 15px red, 0 0 35px red, 0 0 60px rgba(255, 0, 0, .7);
            transform: scale(1.05);
            cursor: pointer;
        }

        .spin {
            animation: rotate 3s linear infinite, glow 1.5s ease-in-out infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px red; }
            50% {
                box-shadow: 0 0 20px red, 0 0 45px red, 0 0 70px rgba(255, 0, 0, .8);
            }
        }

        .polaroid {
            width: 200px;
            background: #ffffffc2;
            padding: 10px 10px 40px;
            position: relative;
            transform: rotate(-6deg);
            box-shadow: 0 10px 25px rgba(0, 0, 0, .45);
            transition: transform 0.4s, box-shadow 0.4s;
        }

        .polaroid img {
            width: 100%;
            display: block;
        }

        .polaroid span {
            display: block;
            margin-top: 15px;
            text-align: center;
            font-size: 22px;
            font-family: cursive;
            color: #000;
        }

        .polaroid:hover {
            transform: rotate(-2deg) translateY(-12px) scale(1.05);
            box-shadow: 0 25px 40px rgba(0, 0, 0, .5);
        }

        .tape {
            width: 80px;
            height: 25px;
            background: #9a4242;
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%) rotate(3deg);
            transition: .4s;
            opacity: 0.8;
        }

        .polaroid:hover .tape {
            transform: translateX(-50%) rotate(-4deg);
        }
    </style>
    <body>
    <h1 class="page-title">
        <b><i>🎤 T-Pop💿</i></b></h1>
    <div class="song-container" id="song-container"></div>
    <script>
     // 1. Create a list (array) of all your songs
    const songs = [
        {
        title: "",
        artist: "",
        audio: "",
        image: ""
    },
    {
        title: "",
        artist: "",
        audio: "",
        image: ""
    },
    {
        title: "",
        artist: "",
        audio: "",
        image: ""
    },
    {
        title: "",
        artist: "",
        audio: "",
        image: ""
    },
];
    // ==============================
// Generate Music Cards
// ==============================

// Find the container
const container = document.getElementById("song-container");

// Create a card for each song
songs.forEach(song => {
    const cardHTML = `
        <div class="music-card">
            <div class="music-info">
                <h1><i>${song.title}</i></h1>
                <p><b>${song.artist}</b></p>

                <audio controls>
                    <source src="${song.audio}" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>

            <div class="disc">💿</div>

            <div class="polaroid">
                <div class="tape"></div>
                <img src="${song.image}" alt="${song.title}">
                <span>${song.artist}</span>
            </div>
        </div>
    `;

    container.innerHTML += cardHTML;
});

// ==============================
// Select All Music Cards
// ==============================

const cards = document.querySelectorAll(".music-card");

// ==============================
// Audio & Disc Animation
// ==============================

cards.forEach(card => {

    const audio = card.querySelector("audio");
    const disc = card.querySelector(".disc");

    audio.addEventListener("play", () => {

        // Pause all other songs
        document.querySelectorAll("audio").forEach(a => {
            if (a !== audio) {
                a.pause();
            }
        });

        // Stop all spinning discs
        document.querySelectorAll(".disc").forEach(d => {
            d.classList.remove("spin");
        });

        // Spin current disc
        disc.classList.add("spin");
    });

    // Stop spinning when paused
    audio.addEventListener("pause", () => {
        disc.classList.remove("spin");
    });

    // Stop spinning when song ends
    audio.addEventListener("ended", () => {
        disc.classList.remove("spin");
    });

});

// ==============================
// Scroll Reveal Animation
// ==============================

const observer = new IntersectionObserver(entries => {

    entries.forEach(entry => {

        if (entry.isIntersecting) {
            entry.target.classList.add("show");
        }

    });

}, {
    threshold: 0.2
});

// Observe every music card
cards.forEach(card => observer.observe(card));
// loop all songs //
const audios = document.querySelectorAll("audio");
audios.forEach((audio, index) => {

    audio.addEventListener("ended", () => {

        // Stop current disc
        document.querySelectorAll(".disc")[index].classList.remove("spin");

        // Find next song
        let nextIndex = index + 1;

        // If last song, go back to first
        if (nextIndex >= audios.length) {
            nextIndex = 0;
        }

        // Play next song
        audios[nextIndex].play();

    });

});
    </script>
